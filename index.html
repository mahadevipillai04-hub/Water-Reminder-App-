
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; }
  #app { padding: 2rem 1rem; max-width: 480px; margin: 0 auto; }
  .title { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--color-text-primary); margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 2rem; }
  .glass-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 2rem; }
  .glass { width: 44px; height: 56px; border-radius: 4px 4px 10px 10px; border: 2px solid var(--color-border-secondary); position: relative; overflow: hidden; cursor: pointer; transition: transform 0.15s; background: var(--color-background-primary); }
  .glass:hover { transform: scale(1.08); }
  .glass-fill { position: absolute; bottom: 0; left: 0; right: 0; background: #3A9BD5; transition: height 0.4s cubic-bezier(.4,0,.2,1); }
  .glass.done .glass-fill { background: #1D9E75; }
  .glass svg { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 2; }
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 2rem; }
  .stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px; text-align: center; }
  .stat-val { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
  .stat-lbl { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
  .timer-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 16px; }
  .timer-circle { width: 72px; height: 72px; flex-shrink: 0; }
  .timer-label { font-size: 13px; color: var(--color-text-secondary); }
  .timer-val { font-size: 28px; font-weight: 500; color: var(--color-text-primary); font-variant-numeric: tabular-nums; }
  .timer-next { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
  .btn-row { display: flex; gap: 10px; }
  button { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); padding: 10px 18px; cursor: pointer; transition: all 0.15s; background: var(--color-background-secondary); color: var(--color-text-primary); }
  button:hover { background: var(--color-background-tertiary); }
  button.primary { background: #3A9BD5; color: #fff; border-color: #3A9BD5; }
  button.primary:hover { background: #2a7db5; }
  .notif { font-size: 13px; color: var(--color-text-secondary); margin-top: 1rem; padding: 10px 14px; background: var(--color-background-info); color: var(--color-text-info); border-radius: var(--border-radius-md); display: none; }
  .progress-bar-wrap { height: 8px; background: var(--color-background-secondary); border-radius: 99px; overflow: hidden; margin-bottom: 0.5rem; }
  .progress-bar { height: 100%; border-radius: 99px; background: #3A9BD5; transition: width 0.5s; }
  .progress-label { font-size: 12px; color: var(--color-text-secondary); text-align: right; }
  .settings { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
  .settings label { font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 4px; }
  .settings input { width: 100%; padding: 7px 10px; font-size: 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); font-family: inherit; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  h3 { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 12px; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 99px; background: var(--color-background-success); color: var(--color-text-success); margin-left: 8px; }
</style>

<div id="app">
  <div class="title">HydroRemind <span id="badge" class="badge" style="display:none">Active</span></div>
  <div class="subtitle">Drink water every 3 hours — stay hydrated all day.</div>

  <div class="settings">
    <h3>Your settings</h3>
    <div class="row2">
      <div>
        <label>Daily goal (glasses)</label>
        <input type="number" id="goalInput" min="4" max="16" value="8" />
      </div>
      <div>
        <label>Remind every (hours)</label>
        <input type="number" id="intervalInput" min="1" max="6" value="3" />
      </div>
    </div>
    <div style="margin-top:10px;">
      <button class="primary" onclick="startReminder()">Start reminders</button>
      <button onclick="resetAll()" style="margin-left:8px;">Reset</button>
    </div>
  </div>

  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div class="progress-label" id="progressLabel">0 / 8 glasses</div>
  <br>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="statDrank">0</div><div class="stat-lbl">Glasses drunk</div></div>
    <div class="stat"><div class="stat-val" id="statLeft">8</div><div class="stat-lbl">Remaining</div></div>
    <div class="stat"><div class="stat-val" id="statStreak">0</div><div class="stat-lbl">Day streak</div></div>
  </div>

  <div class="timer-card">
    <svg class="timer-circle" viewBox="0 0 72 72">
      <circle cx="36" cy="36" r="30" fill="none" stroke="var(--color-border-tertiary)" stroke-width="6"/>
      <circle id="timerArc" cx="36" cy="36" r="30" fill="none" stroke="#3A9BD5" stroke-width="6"
        stroke-dasharray="188.5" stroke-dashoffset="0" stroke-linecap="round"
        transform="rotate(-90 36 36)" style="transition: stroke-dashoffset 1s linear"/>
    </svg>
    <div>
      <div class="timer-label">Next reminder in</div>
      <div class="timer-val" id="timerDisplay">3:00:00</div>
      <div class="timer-next" id="timerNext">Start reminders to begin</div>
    </div>
  </div>

  <div class="glass-row" id="glassRow"></div>

  <div class="btn-row">
    <button class="primary" onclick="drinkGlass()">+ Log a glass</button>
    <button onclick="skipReminder()">Skip this reminder</button>
  </div>
  <div class="notif" id="notif"></div>
</div>

<script>
  let goal = 8, interval = 3, drank = 0, streak = 0;
  let totalSecs = 3 * 3600, remainSecs = 3 * 3600;
  let timerID = null, running = false;

  function renderGlasses() {
    const row = document.getElementById('glassRow');
    row.innerHTML = '';
    for (let i = 0; i < goal; i++) {
      const g = document.createElement('div');
      g.className = 'glass' + (i < drank ? ' done' : '');
      const pct = i < drank ? 100 : 0;
      g.innerHTML = `<div class="glass-fill" style="height:${pct}%"></div>
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path d="M5 3 L4 15 L14 15 L13 3 Z" fill="none" stroke="${i < drank ? '#fff' : 'var(--color-border-secondary)'}" stroke-width="1.2"/>
        </svg>`;
      g.title = i < drank ? 'Drunk' : 'Pending';
      row.appendChild(g);
    }
  }

  function updateStats() {
    document.getElementById('statDrank').textContent = drank;
    document.getElementById('statLeft').textContent = Math.max(0, goal - drank);
    document.getElementById('statStreak').textContent = streak;
    const pct = Math.min(100, Math.round((drank / goal) * 100));
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = drank + ' / ' + goal + ' glasses (' + pct + '%)';
  }

  function fmtTime(s) {
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
    return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
  }

  function updateTimer() {
    document.getElementById('timerDisplay').textContent = fmtTime(remainSecs);
    const arc = document.getElementById('timerArc');
    const dashLen = 188.5;
    const offset = dashLen * (1 - remainSecs / totalSecs);
    arc.style.strokeDashoffset = offset;
    const now = new Date(Date.now() + remainSecs * 1000);
    document.getElementById('timerNext').textContent = 'Next at ' + now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }

  function showNotif(msg, type) {
    const n = document.getElementById('notif');
    n.textContent = msg;
    n.style.display = 'block';
    n.style.background = type === 'success' ? 'var(--color-background-success)' : 'var(--color-background-info)';
    n.style.color = type === 'success' ? 'var(--color-text-success)' : 'var(--color-text-info)';
    clearTimeout(n._t);
    n._t = setTimeout(() => n.style.display = 'none', 3000);
  }

  function fireReminder() {
    showNotif('Time to drink a glass of water! Stay hydrated.', 'info');
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification('HydroRemind', { body: 'Time to drink a glass of water!', icon: '' });
    }
    remainSecs = totalSecs;
    updateTimer();
  }

  function tick() {
    if (remainSecs <= 0) {
      fireReminder();
    } else {
      remainSecs--;
      updateTimer();
    }
  }

  function startReminder() {
    goal = parseInt(document.getElementById('goalInput').value) || 8;
    interval = parseInt(document.getElementById('intervalInput').value) || 3;
    totalSecs = interval * 3600;
    remainSecs = totalSecs;
    if (timerID) clearInterval(timerID);
    running = true;
    document.getElementById('badge').style.display = '';
    if ('Notification' in window && Notification.permission !== 'granted') {
      Notification.requestPermission();
    }
    renderGlasses();
    updateStats();
    updateTimer();
    timerID = setInterval(tick, 1000);
    showNotif('Reminders started! Every ' + interval + ' hour(s).', 'success');
  }

  function drinkGlass() {
    if (drank < goal) {
      drank++;
      if (drank === goal) { streak++; showNotif('Goal reached! Great job staying hydrated today.', 'success'); }
      else showNotif('Nice! Glass logged. ' + (goal - drank) + ' more to go.', 'success');
      renderGlasses();
      updateStats();
    } else {
      showNotif('Daily goal already met! Great work.', 'success');
    }
  }

  function skipReminder() {
    remainSecs = totalSecs;
    updateTimer();
    showNotif('Reminder snoozed for another ' + interval + ' hour(s).', 'info');
  }

  function resetAll() {
    drank = 0;
    if (timerID) clearInterval(timerID);
    running = false;
    remainSecs = totalSecs;
    document.getElementById('badge').style.display = 'none';
    document.getElementById('timerNext').textContent = 'Start reminders to begin';
    renderGlasses();
    updateStats();
    updateTimer();
    showNotif('Reset done.', 'info');
  }

  renderGlasses();
  updateStats();
  updateTimer();
</script>
